name: release

# Attaches platform binaries to the GitHub Release that release-please created
# (release-type "simple") and publishes a multi-platform Homebrew formula to
# neverprepared/homebrew-tap.
#
#   build   — matrix over NATIVE runners. pskillctl needs CGO (mattn/go-sqlite3)
#             which won't cross-compile cleanly, so every platform compiles on
#             its own OS. Each leg packages pskillctl_<os>_<arch>.tar.gz plus a
#             .sha256 and uploads it as an artifact.
#   publish — downloads every leg's archive, uploads them to the release, then
#             renders Formula/pskillctl.rb and pushes it to the tap.
#
# Required secret:
#   HOMEBREW_TAP_TOKEN — fine-grained PAT with contents:write on
#                        neverprepared/homebrew-tap.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to build + attach binaries to (e.g. v1.2.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - { os: macos-14, goos: darwin, goarch: arm64 }
          - { os: ubuntu-latest, goos: linux, goarch: amd64 }
          - { os: ubuntu-24.04-arm, goos: linux, goarch: arm64 }
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build + package
        env:
          TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          make build VERSION="$TAG"
          ./pskillctl client version   # fail fast if the binary won't run/stamp

          NAME="pskillctl_${{ matrix.goos }}_${{ matrix.goarch }}"
          mkdir -p out
          tar -czf "out/${NAME}.tar.gz" pskillctl LICENSE README.md
          shasum -a 256 "out/${NAME}.tar.gz" | awk '{print $1}' > "out/${NAME}.tar.gz.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: asset_${{ matrix.goos }}_${{ matrix.goarch }}
          path: out/*
          if-no-files-found: error
          retention-days: 1

  publish:
    name: upload assets + push formula
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: assets
          pattern: asset_*
          merge-multiple: true

      - name: Upload archives to the release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: |
            assets/*.tar.gz
            assets/*.tar.gz.sha256
          fail_on_unmatched_files: true

      - name: Render + publish Homebrew formula
        env:
          TAG: ${{ inputs.tag || github.ref_name }}
          REPO: ${{ github.repository }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          VER="${TAG#v}"
          base="https://github.com/${REPO}/releases/download/${TAG}"
          darwin_arm64_sha="$(cat assets/pskillctl_darwin_arm64.tar.gz.sha256)"
          linux_amd64_sha="$(cat assets/pskillctl_linux_amd64.tar.gz.sha256)"
          linux_arm64_sha="$(cat assets/pskillctl_linux_arm64.tar.gz.sha256)"
          export VER base darwin_arm64_sha linux_amd64_sha linux_arm64_sha

          mkdir -p tap/Formula
          cat > formula.tmpl <<'EOF'
          # typed: false
          # frozen_string_literal: true

          # Generated by neverprepared/phantom-skills release workflow.
          # Do not edit by hand — changes are overwritten on next release.
          class Pskillctl < Formula
            desc "Self-improving skills daemon for the phantom control-server fleet"
            homepage "https://github.com/neverprepared/phantom-skills"
            version "${VER}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "${base}/pskillctl_darwin_arm64.tar.gz"
                sha256 "${darwin_arm64_sha}"
              end
            end

            on_linux do
              if Hardware::CPU.intel?
                url "${base}/pskillctl_linux_amd64.tar.gz"
                sha256 "${linux_amd64_sha}"
              end
              if Hardware::CPU.arm?
                url "${base}/pskillctl_linux_arm64.tar.gz"
                sha256 "${linux_arm64_sha}"
              end
            end

            def install
              bin.install "pskillctl"
            end

            def caveats
              <<~CAVEAT
                pskillctl is two roles in one binary — agent (`pskillctl client mcp`)
                and daemon (`pskillctl server serve`). For the agent, point your MCP
                host at it via .claude.json with the CL_SKILLS_* env contract. For the
                daemon, set:

                  PSKILLS_CONFIG_DIR  (default: ~/.config/phantom-skills-server)
                  PSKILLS_DATA_DIR    (default: ~/.local/share/phantom-skills-server)

                then `pskillctl server serve`. See:
                  https://github.com/neverprepared/phantom-skills#setup
              CAVEAT
            end

            test do
              system "#{bin}/pskillctl", "client", "version"
            end
          end
          EOF

          # shellcheck disable=SC2016
          envsubst '${VER} ${base} ${darwin_arm64_sha} ${linux_amd64_sha} ${linux_arm64_sha}' \
            < formula.tmpl > tap/Formula/pskillctl.rb

          git clone --depth 1 \
            "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/neverprepared/homebrew-tap.git" taprepo
          mkdir -p taprepo/Formula
          cp tap/Formula/pskillctl.rb taprepo/Formula/pskillctl.rb
          cd taprepo
          if git diff --quiet -- Formula/pskillctl.rb; then
            echo "Formula unchanged — nothing to push."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/pskillctl.rb
          git commit -m "pskillctl ${VER}"
          git push
